name: Sync files from feature branch to main

on:
  push:
    branches:
      - claude/fix-api-call-error-EpFts
    paths:
      - 'index.html'
      - 'worker.js'
      - '.github/workflows/restore-files.yml'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync index.html and worker.js from feature branch to main
        run: |
          git fetch origin claude/fix-api-call-error-EpFts
          git checkout origin/claude/fix-api-call-error-EpFts -- index.html worker.js
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html worker.js
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "sync: 從 feature branch 同步 index.html / worker.js"
            git push origin main
          fi
