<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>機水電設計圖說 自主檢查系統</title>
<style>
:root{
  --sb:#1e2d3d;--sbh:#2d4057;--pr:#3b82f6;--prd:#2563eb;
  --ok:#10b981;--wa:#f59e0b;--er:#ef4444;
  --g50:#f8fafc;--g100:#f1f5f9;--g200:#e2e8f0;--g300:#cbd5e1;
  --g400:#94a3b8;--g500:#64748b;--g600:#475569;--g700:#334155;--g800:#1e293b;
  --r:8px;--sh:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
  --sh2:0 4px 6px -1px rgba(0,0,0,.1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',-apple-system,'微軟正黑體',sans-serif;
  background:var(--g50);color:var(--g800);height:100vh;overflow:hidden;
  display:flex;flex-direction:column;font-size:14px}

/* ── Header ── */
.hdr{background:#fff;border-bottom:1px solid var(--g200);padding:0 18px;
  height:56px;display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;box-shadow:var(--sh);z-index:10}
.hdr-l{display:flex;align-items:center;gap:10px}
.logo{width:32px;height:32px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);
  border-radius:7px;display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:15px;font-weight:700;flex-shrink:0}
.app-t{font-size:13.5px;font-weight:700;color:var(--g800)}
.app-s{font-size:10.5px;color:var(--g500)}
.hdr-r{display:flex;align-items:center;gap:10px}
.pf{display:flex;flex-direction:column;align-items:flex-end}
.pf label{font-size:9.5px;color:var(--g400);text-transform:uppercase;letter-spacing:.05em}
.pf input{border:none;border-bottom:1px solid var(--g200);padding:1px 3px;
  font-size:12px;color:var(--g700);background:transparent;text-align:right;
  font-family:inherit;width:130px}
.pf input[id=drawingRev]{width:65px}
.pf input[type=date]{width:115px}
.pf input:focus{outline:none;border-bottom-color:var(--pr)}
.btn{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600;
  cursor:pointer;border:none;transition:all .15s;font-family:inherit}
.btn-p{background:var(--pr);color:#fff}.btn-p:hover{background:var(--prd)}
.btn-d{background:#fff;border:1px solid #fca5a5;color:var(--er)}.btn-d:hover{background:#fef2f2}

/* ── Layout ── */
.body{display:flex;flex:1;overflow:hidden}

/* ── Sidebar ── */
.sb{width:230px;background:var(--sb);flex-shrink:0;display:flex;flex-direction:column;overflow:hidden}
.sb-sec{padding:12px 14px 5px;font-size:9.5px;text-transform:uppercase;
  letter-spacing:.1em;color:#4a5568;font-weight:600}
.sb-nav{flex:1;overflow-y:auto;padding:3px 0}
.sb-nav::-webkit-scrollbar{width:3px}
.sb-nav::-webkit-scrollbar-thumb{background:#374151;border-radius:2px}

/* Parent nav item */
.nav-item{display:flex;align-items:center;padding:8px 12px;cursor:pointer;
  transition:all .15s;gap:9px;position:relative;user-select:none}
.nav-item:hover{background:var(--sbh)}
.nav-item.active{background:rgba(59,130,246,.15)}
.nav-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;
  width:3px;background:var(--pr);border-radius:0 2px 2px 0}
.nav-ic{width:24px;height:24px;border-radius:5px;display:flex;align-items:center;
  justify-content:center;font-size:12px;flex-shrink:0}
.nav-ct{flex:1;min-width:0}
.nav-nm{font-size:12px;font-weight:500;color:#94a3b8;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-item.active .nav-nm,.nav-item.sub-active .nav-nm{color:#fff}
.nav-pw{display:flex;align-items:center;gap:4px;margin-top:2px}
.nav-pb{flex:1;height:2.5px;background:#374151;border-radius:2px;overflow:hidden}
.nav-pf{height:100%;border-radius:2px;transition:width .3s}
.nav-pt{font-size:9.5px;color:#4a5568;white-space:nowrap}
.nav-item.active .nav-pt,.nav-item.sub-active .nav-pt{color:#94a3b8}
.nav-arrow{font-size:10px;color:#4a5568;transition:transform .2s;flex-shrink:0;margin-left:2px}
.nav-arrow.open{transform:rotate(90deg)}

/* Sub nav items */
.sub-nav{overflow:hidden;max-height:0;transition:max-height .25s ease}
.sub-nav.open{max-height:400px}
.sub-item{display:flex;align-items:center;padding:7px 12px 7px 36px;
  cursor:pointer;transition:all .15s;gap:7px;position:relative;user-select:none}
.sub-item:hover{background:rgba(255,255,255,.06)}
.sub-item.active{background:rgba(59,130,246,.12)}
.sub-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;
  width:2px;background:var(--pr);border-radius:0 1px 1px 0}
.sub-dot{width:6px;height:6px;border-radius:50%;background:#4a5568;flex-shrink:0;transition:background .15s}
.sub-item.active .sub-dot{background:var(--pr)}
.sub-nm{font-size:11.5px;color:#6b7280;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sub-item.active .sub-nm{color:#93c5fd;font-weight:500}
.sub-cnt{font-size:10px;color:#374151;flex-shrink:0}
.sub-item.active .sub-cnt{color:#6b7280}

/* 系統權限鎖定 */
.nav-item.locked{opacity:.38;cursor:default;pointer-events:none}
.nav-item.locked:hover{background:transparent}
.lock-ic{font-size:12px;color:#4a5568;flex-shrink:0;margin-left:2px}

/* Sidebar footer */
.sb-foot{padding:12px;border-top:1px solid #2d3748}
.ov-lbl{display:flex;justify-content:space-between;font-size:11px;color:#94a3b8;margin-bottom:4px}
.ov-bar{height:5px;background:#2d3748;border-radius:3px;overflow:hidden;margin-bottom:10px}
.ov-fill{height:100%;border-radius:3px;transition:width .3s;
  background:linear-gradient(90deg,var(--pr),#34d399)}
.sb-acts{display:flex;gap:6px}
.sb-btn{flex:1;padding:6px;border-radius:6px;font-size:11.5px;cursor:pointer;
  border:none;font-weight:500;font-family:inherit;transition:all .15s}
.sb-btn-p{background:var(--pr);color:#fff}.sb-btn-p:hover{background:var(--prd)}
.sb-btn-g{background:#2d3748;color:#94a3b8}.sb-btn-g:hover{background:#374151;color:#fff}

/* ── Main ── */
.main{flex:1;overflow-y:auto;padding:18px}
.main::-webkit-scrollbar{width:5px}
.main::-webkit-scrollbar-thumb{background:var(--g300);border-radius:3px}

/* Page title banner */
.page-banner{background:linear-gradient(135deg,#1e3a5f,#2563eb);
  border-radius:var(--r);padding:16px 20px;margin-bottom:14px;
  display:flex;align-items:center;justify-content:space-between}
.banner-title{color:#fff;font-size:15px;font-weight:700;letter-spacing:.02em}
.banner-sub{color:#93c5fd;font-size:11px;margin-top:2px}
.banner-badge{background:rgba(255,255,255,.15);color:#fff;padding:4px 12px;
  border-radius:20px;font-size:11px;font-weight:600}

/* System overview card (shown when parent selected, no sub) */
.sys-overview{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;margin-bottom:4px}
.sub-card{background:#fff;border-radius:var(--r);padding:14px 16px;box-shadow:var(--sh);
  cursor:pointer;transition:all .18s;border:2px solid transparent;position:relative}
.sub-card:hover{box-shadow:var(--sh2);border-color:var(--pr);transform:translateY(-1px)}
.sub-card.done{border-color:var(--ok)}
.sub-card-ic{font-size:22px;margin-bottom:8px}
.sub-card-nm{font-size:13px;font-weight:600;color:var(--g700);margin-bottom:6px}
.sub-card-prog{display:flex;align-items:center;gap:6px}
.sc-bar{flex:1;height:4px;background:var(--g200);border-radius:2px;overflow:hidden}
.sc-fill{height:100%;border-radius:2px;transition:width .3s}
.sc-pct{font-size:10.5px;color:var(--g500);flex-shrink:0}
.sub-card-cnt{font-size:10.5px;color:var(--g400);margin-top:4px}

/* Legend */
.legend{display:flex;align-items:center;gap:10px;margin-bottom:10px;
  padding:8px 13px;background:#fff;border-radius:var(--r);box-shadow:var(--sh);
  flex-wrap:wrap;font-size:11px}
.li{display:flex;align-items:center;gap:3px;color:var(--g600)}
.ldiv{color:var(--g300);margin:0 1px}

/* System header */
.sys-hdr{background:#fff;border-radius:var(--r);padding:15px 18px;
  margin-bottom:10px;box-shadow:var(--sh);display:flex;align-items:center;gap:12px}
.sys-ic{width:42px;height:42px;border-radius:10px;display:flex;
  align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.sys-hdr-ct{flex:1}
.sys-title{font-size:15px;font-weight:700;color:var(--g800);margin-bottom:2px}
.sys-meta{font-size:11px;color:var(--g500)}
.sys-right{display:flex;align-items:center;gap:12px}
.stats{display:flex;gap:12px}
.stat{text-align:center}
.stat-v{font-size:17px;font-weight:700;line-height:1}
.stat-l{font-size:10px;color:var(--g400);margin-top:2px}
.circ{position:relative;width:50px;height:50px;flex-shrink:0}
.circ svg{transform:rotate(-90deg)}
.circ-txt{position:absolute;inset:0;display:flex;align-items:center;
  justify-content:center;font-size:11px;font-weight:700;color:var(--g700)}

/* Checklist */
.cl-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.cl-item{background:#fff;border-radius:var(--r);padding:11px 13px;
  box-shadow:var(--sh);border-left:4px solid transparent;transition:all .15s}
.cl-item:hover{box-shadow:var(--sh2)}
.cl-item.sa{border-left-color:var(--er)}
.cl-item.sb2{border-left-color:var(--wa)}
.cl-item.sc{border-left-color:var(--ok)}
.cl-item.s-pass{background:#f0fdf4}
.cl-item.s-issue{background:#fff7f7}
.cl-item.s-na{opacity:.5}
.item-row{display:flex;align-items:flex-start;gap:9px}
.status-btns{display:flex;gap:3px;flex-shrink:0;margin-top:1px}
.sb3{width:26px;height:26px;border-radius:5px;border:1.5px solid var(--g200);
  background:#fff;cursor:pointer;font-size:11px;display:flex;align-items:center;
  justify-content:center;transition:all .15s;font-family:inherit}
.sb3:hover{border-color:var(--g400);background:var(--g50)}
.sb3.ap{background:var(--ok);border-color:var(--ok);color:#fff}
.sb3.ai{background:var(--er);border-color:var(--er);color:#fff}
.sb3.an{background:var(--g400);border-color:var(--g400);color:#fff}
.item-ct{flex:1;min-width:0}
.item-hdr{display:flex;align-items:center;gap:6px;margin-bottom:2px}
.badge{padding:1.5px 6px;border-radius:4px;font-size:10px;font-weight:700;flex-shrink:0}
.ba{background:#fef2f2;color:var(--er)}
.bb{background:#fffbeb;color:#d97706}
.bc{background:#ecfdf5;color:#059669}
.item-txt{font-size:12.5px;color:var(--g700);line-height:1.55}
.item-basis{font-size:10.5px;color:var(--g400);margin-top:2px}
.item-foot{display:flex;justify-content:flex-end;margin-top:4px}
.note-tog{font-size:10.5px;color:var(--g400);cursor:pointer;background:none;
  border:none;padding:2px 5px;border-radius:4px;transition:all .15s;font-family:inherit}
.note-tog:hover{color:var(--pr);background:var(--g100)}
.note-area{margin-top:6px;display:none}
.note-area.show{display:block}
.note-ta{width:100%;border:1px solid var(--g200);border-radius:6px;
  padding:5px 9px;font-size:11.5px;color:var(--g600);resize:vertical;
  min-height:36px;font-family:inherit;background:var(--g50);line-height:1.5}
.note-ta:focus{outline:none;border-color:var(--pr);background:#fff}

/* Signature */
.sig-sec{background:#fff;border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh)}
.sig-title{font-size:11.5px;font-weight:600;color:var(--g600);margin-bottom:9px;
  padding-bottom:7px;border-bottom:1px solid var(--g100)}
.sig-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.sig-f{display:flex;flex-direction:column;gap:3px}
.sig-f label{font-size:10.5px;color:var(--g400)}
.sig-in{border:none;border-bottom:1.5px solid var(--g200);padding:3px 0;
  font-size:12px;color:var(--g700);background:transparent;font-family:inherit;width:100%}
.sig-in:focus{outline:none;border-bottom-color:var(--pr)}

/* Modal */
.modal-ov{position:fixed;inset:0;background:rgba(15,23,42,.55);
  display:flex;align-items:center;justify-content:center;z-index:100;
  backdrop-filter:blur(3px)}
.modal-ov.hidden{display:none}
.modal{background:#fff;border-radius:12px;padding:22px;max-width:400px;
  width:90%;box-shadow:0 20px 40px rgba(0,0,0,.2)}
.modal-title{font-size:14px;font-weight:700;color:var(--g800);margin-bottom:5px}
.modal-desc{font-size:12px;color:var(--g500);margin-bottom:16px;line-height:1.6;white-space:pre-line}
.modal-acts{display:flex;gap:8px;justify-content:flex-end}
.btn-out{background:#fff;border:1px solid var(--g200);color:var(--g600);
  padding:6px 13px;border-radius:6px;font-size:12px;font-weight:500;
  cursor:pointer;font-family:inherit;transition:all .15s}
.btn-out:hover{background:var(--g100)}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:var(--g800);color:#fff;
  padding:8px 14px;border-radius:8px;font-size:12px;box-shadow:var(--sh2);
  transform:translateY(8px);opacity:0;transition:all .2s;z-index:200;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}

/* 登入畫面 */
#loginScreen{position:fixed;inset:0;background:linear-gradient(135deg,#1e2d3d 0%,#2563eb 100%);
  z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:#fff;border-radius:16px;padding:28px 26px;width:100%;max-width:380px;
  box-shadow:0 25px 60px rgba(0,0,0,.35)}
.login-logo{width:48px;height:48px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);
  border-radius:12px;display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:22px;font-weight:700;margin:0 auto 14px}
.login-title{font-size:15.5px;font-weight:700;color:var(--g800);text-align:center;margin-bottom:3px}
.login-sub{font-size:11.5px;color:var(--g400);text-align:center;margin-bottom:18px}
.acct-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;max-height:260px;overflow-y:auto}
.acct-row{display:flex;align-items:center;gap:8px;padding:10px 11px;background:var(--g50);
  border-radius:var(--r);border:1px solid var(--g200)}
.acct-av{width:34px;height:34px;border-radius:50%;
  background:linear-gradient(135deg,#3b82f6,#6366f1);
  display:flex;align-items:center;justify-content:center;color:#fff;
  font-size:14px;font-weight:700;flex-shrink:0}
.acct-nm{font-size:13px;font-weight:600;color:var(--g700);flex:1;min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.acct-pw{border:1px solid var(--g200);border-radius:5px;padding:4px 7px;font-size:12px;
  width:86px;font-family:inherit;color:var(--g700)}
.acct-pw:focus{outline:none;border-color:var(--pr)}
.login-div{display:flex;align-items:center;gap:8px;margin:12px 0;font-size:11px;color:var(--g300)}
.login-div::before,.login-div::after{content:'';flex:1;height:1px;background:var(--g200)}
.new-acct-form{display:flex;flex-direction:column;gap:7px}
.new-acct-form input{border:1px solid var(--g200);border-radius:6px;padding:7px 10px;
  font-size:12.5px;font-family:inherit;color:var(--g700);width:100%}
.new-acct-form input:focus{outline:none;border-color:var(--pr)}

/* 紀錄管理 */
.btn-rec{background:#fff;border:1px solid var(--g200);color:var(--g600)}
.btn-rec:hover{background:var(--g100);color:var(--g800)}
.rec-item{display:flex;align-items:center;gap:10px;padding:11px 13px;
  background:var(--g50);border-radius:var(--r);border:1px solid var(--g200);transition:border-color .15s}
.rec-item:hover{border-color:var(--g300)}
.rec-info{flex:1;min-width:0}
.rec-name{font-size:13px;font-weight:600;color:var(--g800);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rec-meta{font-size:10.5px;color:var(--g400);margin-top:2px}
.rec-prog{display:flex;align-items:center;gap:6px;margin-top:5px}
.rec-bar{flex:1;height:4px;background:var(--g200);border-radius:2px;overflow:hidden}
.rec-fill{height:100%;background:var(--pr);border-radius:2px;transition:width .3s}
.rec-pct{font-size:10.5px;color:var(--g500);flex-shrink:0;min-width:28px;text-align:right}
.rec-acts{display:flex;gap:5px;flex-shrink:0;align-items:center}

/* Welcome screen */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:60vh;text-align:center;gap:12px}
.welcome-ic{font-size:52px}
.welcome-t{font-size:17px;font-weight:700;color:var(--g700)}
.welcome-s{font-size:12.5px;color:var(--g400);max-width:320px;line-height:1.6}

/* ── 列印狀態標籤（螢幕隱藏，列印顯示）── */
.print-lbl{display:none}
.print-sum{display:none}

@media print{
  /* 強制列印背景色 */
  *{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important;color-adjust:exact !important}

  body{height:auto;overflow:visible}
  .hdr{display:flex !important;box-shadow:none;border-bottom:2px solid #1e3a5f;margin-bottom:6px}
  .hdr .btn,.hdr .btn-d{display:none !important}
  .sb,.legend,.modal-ov,.toast{display:none !important}
  .body{display:block}
  .main{overflow:visible;padding:4px 0}
  .page-banner{margin-bottom:8px;-webkit-print-color-adjust:exact !important}

  /* 摘要統計列：列印時顯示 */
  .print-sum{
    display:flex !important;gap:0;margin-bottom:10px;
    border:2px solid #1e3a5f;border-radius:8px;overflow:hidden;
    font-size:12px;font-weight:600;break-inside:avoid
  }
  .ps-cell{flex:1;padding:8px 10px;text-align:center;border-right:1px solid rgba(255,255,255,.3)}
  .ps-cell:last-child{border-right:none}
  .ps-cell .ps-num{font-size:20px;font-weight:800;line-height:1;display:block;margin-bottom:2px}
  .ps-cell .ps-lbl{font-size:10px;opacity:.85;display:block}
  .ps-total{background:#1e3a5f;color:#fff}
  .ps-pass {background:#065f46;color:#fff}
  .ps-issue{background:#991b1b;color:#fff}
  .ps-na   {background:#374151;color:#fff}
  .ps-todo {background:#92400e;color:#fff}

  /* 核對項目底色辨識 */
  .cl-item{
    break-inside:avoid;box-shadow:none;
    border:1px solid #d1d5db;border-left:5px solid #d1d5db;
    margin-bottom:5px;padding:9px 11px
  }
  /* 未核對：淡黃，最醒目——代表「還沒看」 */
  .cl-item:not(.s-pass):not(.s-issue):not(.s-na){
    background:#fef9c3 !important;border-left-color:#ca8a04 !important
  }
  /* 符合：淡綠 */
  .cl-item.s-pass{background:#dcfce7 !important;border-left-color:#16a34a !important}
  /* 有問題：淡紅 */
  .cl-item.s-issue{background:#fee2e2 !important;border-left-color:#dc2626 !important;opacity:1 !important}
  /* 不適用：淡灰 */
  .cl-item.s-na{background:#f3f4f6 !important;border-left-color:#9ca3af !important;opacity:1 !important}

  /* 隱藏三態按鈕，改顯示狀態標籤 */
  .status-btns{display:none}
  .print-lbl{
    display:inline-flex !important;align-items:center;
    padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;
    margin-bottom:4px;border:1.5px solid currentColor
  }
  .pl-pass{background:#dcfce7;color:#15803d;border-color:#16a34a}
  .pl-issue{background:#fee2e2;color:#b91c1c;border-color:#dc2626}
  .pl-na{background:#f3f4f6;color:#6b7280;border-color:#9ca3af}
  .pl-todo{background:#fef9c3;color:#92400e;border-color:#ca8a04}

  .note-area{display:block !important}
  .note-tog{display:none}
  .sys-hdr{break-inside:avoid;box-shadow:none;border:1px solid #e2e8f0;margin-bottom:8px}
  .sig-sec{break-inside:avoid;box-shadow:none;border:1px solid #e2e8f0;margin-top:10px}
  .cl-list{gap:4px}
  @page{margin:14mm;size:A4}
}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">M</div>

// 狀態
// ═══════════════════════════════════════════════
let KEY='mep_v3';
let S={
  sys:'',        // 目前選中的 parent系統 id
  sub:'',        // 目前選中的 sub系統 id（expandable才有）
  expanded:{},   // {sysId: true/false}
  chk:{},        // {itemId: 'pass'|'issue'|'na'|''}
  note:{},       // {itemId: string}
  sig:{}         // {subId|sysId: {designer,checker,date}}
};

// ═══════════════════════════════════════════════
// LocalStorage
// ═══════════════════════════════════════════════
function save(){
  localStorage.setItem(KEY,JSON.stringify({
    sys:S.sys,sub:S.sub,expanded:S.expanded,
    chk:S.chk,note:S.note,sig:S.sig,
    proj:{name:g('projectName').value,rev:g('drawingRev').value,date:g('checkDate').value},
    ts:new Date().toISOString()
  }));
}
function loadSaved(){try{return JSON.parse(localStorage.getItem(KEY));}catch(e){return null;}}
function applyData(d){
  S.sys=d.sys||'';S.sub=d.sub||'';S.expanded=d.expanded||{};
  S.chk=d.chk||{};S.note=d.note||{};S.sig=d.sig||{};
  if(d.proj){g('projectName').value=d.proj.name||'';g('drawingRev').value=d.proj.rev||'';g('checkDate').value=d.proj.date||'';}
}

// ═══════════════════════════════════════════════
// 統計
// ═══════════════════════════════════════════════
function getItems(target){ // target = sys obj or sub obj
  return target.items||[];
}
function calcStats(items){
  let done=0,issues=0;
  items.forEach(i=>{const s=S.chk[i.id]||'';if(s)done++;if(s==='issue')issues++;});
  return{total:items.length,done,issues,pct:items.length?Math.round(done/items.length*100):0};
}
function sysAllItems(sys){
  if(sys.expandable) return sys.subs.flatMap(s=>s.items);
  return sys.items||[];
}
function canAccessSys(sysId){
  if(!CURR_ACCT)return true;
  if(CURR_ACCT.isAdmin)return true;
  return(CURR_ACCT.systems||[]).includes(sysId);
}
function overallStats(){
  let t=0,d=0;
  DATA.forEach(sys=>{
    if(!canAccessSys(sys.id))return;
    const items=sysAllItems(sys);const st=calcStats(items);t+=st.total;d+=st.done;
  });
  return{pct:t?Math.round(d/t*100):0};
}

// ═══════════════════════════════════════════════
// 渲染 Sidebar
// ═══════════════════════════════════════════════
function renderSB(){
  g('sbNav').innerHTML=DATA.map(sys=>{
    const isAct=S.sys===sys.id;
    const isExp=S.expanded[sys.id];
    const items=sysAllItems(sys);
    const st=calcStats(items);
    const ok=canAccessSys(sys.id);
    const actCls=ok?(isAct&&!sys.expandable?' active':isAct?' sub-active':''):'';
    let html=`<div class="nav-item${actCls}${ok?'':' locked'}" ${ok?`onclick="clickParent('${sys.id}')"`:''}>
      <div class="nav-ic" style="background:${sys.bg};color:${sys.color}">${sys.icon}</div>
      <div class="nav-ct">
        <div class="nav-nm">${sys.num}. ${sys.name}</div>
        <div class="nav-pw">
          <div class="nav-pb"><div class="nav-pf" style="width:${st.pct}%;background:${sys.color}"></div></div>
          <div class="nav-pt">${ok?st.done+'/'+st.total:'🔒'}</div>
        </div>
      </div>
      ${ok&&sys.expandable?`<span class="nav-arrow${isExp?' open':''}">▶</span>`:!ok?'<span class="lock-ic">🔒</span>':''}
    </div>`;
    if(sys.expandable&&ok){
      html+=`<div class="sub-nav${isExp?' open':''}">`;
      sys.subs.forEach(sub=>{
        const ss=calcStats(sub.items);
        const isSubAct=S.sub===sub.id;
        html+=`<div class="sub-item${isSubAct?' active':''}" onclick="clickSub('${sys.id}','${sub.id}')">
          <div class="sub-dot"></div>
          <span class="sub-nm">${sub.name}</span>
          <span class="sub-cnt">${ss.done}/${ss.total}</span>
        </div>`;
      });
      html+='</div>';
    }
    return html;
  }).join('');
  const ov=overallStats();
  g('ovPct').textContent=ov.pct+'%';
  g('ovFill').style.width=ov.pct+'%';
}

function clickParent(id){
  if(S.sys===id){
    // 已選中：toggle expand
    S.expanded[id]=!S.expanded[id];
  } else {
    S.sys=id; S.sub='';

// SHA-256 密碼雜湊（Web Crypto API）
const PWD_SALT='mep_chk_2026_s';
async function hashPwd(pwd){
  if(!pwd)return'';
  const buf=await crypto.subtle.digest('SHA-256',
    new TextEncoder().encode(pwd+PWD_SALT));
  return[...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function createAcct(){
  const name=g('newAcctName').value.trim();
  const pwd=g('newAcctPwd').value;
  if(!name){alert('請輸入帳號名稱');return;}
  const accts=loadAccts();
  if(accts.find(a=>a.name===name)){alert('此名稱已存在');return;}
  const id=Date.now().toString();
  const isFirstAcct=accts.length===0;
  const hashed=await hashPwd(pwd);
  accts.push({id,name,pwd:hashed,hasPwd:pwd.length>0,isAdmin:isFirstAcct,systems:[]});
  saveAccts(accts);
  await doLogin(id,pwd);
}

async function doLogin(id,passArg){
  const acct=loadAccts().find(a=>a.id===id);
  if(!acct){alert('帳號不存在');return;}
  if(acct.hasPwd){
    const input=passArg!==undefined?passArg:(g('pw-'+id)?.value||'');
    const hashed=await hashPwd(input);
    if(hashed!==acct.pwd){alert('❌ 密碼錯誤');return;}
  }
  CURR_ACCT=acct;
  KEY='mep_v3_'+id;
  RKEY='mep_records_v3_'+id;
  localStorage.setItem(SESS_KEY,id);
  // 隱藏登入畫面
  g('loginScreen').style.display='none';
  // 顯示使用者標記（管理員加皇冠）
  g('badgeIcon').textContent=acct.isAdmin?'👑':'👤';
  g('badgeName').textContent=acct.name;
  g('userBadge').style.display='inline-flex';
  g('adminBtn').style.display=acct.isAdmin?'inline':'none';
  // 載入此帳號上次資料（靜默恢復）
  const saved=loadSaved();
  if(saved&&saved.ts){applyData(saved);}
  else{g('checkDate').value=new Date().toISOString().split('T')[0];}
  renderSB();renderMain();
}

function delAcct(id){
  const accts=loadAccts();
  const a=accts.find(x=>x.id===id);
  if(!confirm(`確定刪除帳號「${a?.name||id}」？此帳號所有資料將一併清除。`))return;
  saveAccts(accts.filter(x=>x.id!==id));
  localStorage.removeItem('mep_v3_'+id);
  localStorage.removeItem('mep_records_v3_'+id);
  if(localStorage.getItem(SESS_KEY)===id)localStorage.removeItem(SESS_KEY);
  _renderAcctList();
  toast('🗑 已刪除帳號');
}

function logout(){
  if(!confirm('確定要登出？'))return;
  save();
  CURR_ACCT=null;
  localStorage.removeItem(SESS_KEY);
  KEY='mep_v3'; RKEY='mep_records_v3';
  S={sys:'',sub:'',expanded:{},chk:{},note:{},sig:{}};
  g('projectName').value='';g('drawingRev').value='';g('checkDate').value='';

  g('adminBtn').style.display='none';

}

function toggleSysAccess(acctId,sysId,checked){
  let accts=loadAccts();
  const idx=accts.findIndex(a=>a.id===acctId);

  if(checked){if(!accts[idx].systems.includes(sysId))accts[idx].systems.push(sysId);}
  else{accts[idx].systems=accts[idx].systems.filter(s=>s!==sysId);}
  saveAccts(accts);
}

function exportJSON(){
  const proj=g('projectName').value||'未命名專案';
  const data={
    version:'MEP_v3',exportedAt:new Date().toISOString(),
    proj:{name:proj,rev:g('drawingRev').value,date:g('checkDate').value},
    sys:S.sys,sub:S.sub,expanded:S.expanded,
    chk:S.chk,note:S.note,sig:S.sig
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='MEP_'+proj.replace(/[/\\?%*:|"<>]/g,'_')+'_'+new Date().toISOString().split('T')[0]+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('✅ 已匯出 JSON 檔案');
}

function importJSON(e){
  const file=e.target.files[0];if(!file)return;
  const rd=new FileReader();
  rd.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(!d.chk)throw new Error('格式錯誤（缺少 chk 欄位）');
      applyData(d);renderSB();renderMain();save();
      toast('✅ 已匯入：'+(d.proj?.name||file.name));
    }catch(err){alert('❌ 匯入失敗：'+err.message);}
    e.target.value='';
  };
  rd.readAsText(file,'UTF-8');
}

// ═══════════════════════════════════════════════
// 初始化（冷啟動）
// ═══════════════════════════════════════════════
function init(){
  renderSB();renderMain();
  ['projectName','drawingRev','checkDate'].forEach(id=>g(id).addEventListener('change',save));
  _renderAcctList();
  // 嘗試自動恢復上次 session
  const sessId=localStorage.getItem(SESS_KEY);
  if(sessId){
    const acct=loadAccts().find(a=>a.id===sessId);
    if(acct&&!acct.hasPwd){doLogin(sessId,'');return;} // 無密碼帳號自動登入
    // 有密碼帳號：停在登入畫面等待輸入
  }
  // 若沒有 session 或需要密碼，顯示登入畫面（已是預設狀態）
}
init();
</script>
